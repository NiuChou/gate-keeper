version: 1
project: my-project
namespace: default
layer1:
  go_work: false
  shell_syntax: true
  python_packaging: true
  dockerfile_copy: true
  dockerfile_antipatterns: true
  secretref_ban: false
  deprecated_refs:
    enabled: false
  port_chain: false
  namespace_consistency: false
  dc_env_multiline:
    enabled: true
    severity: critical
  dc_env_completeness:
    enabled: true
    severity: critical
  dc_healthcheck_antipatterns:
    enabled: true
    severity: high
  dc_tmpfs_shadow:
    enabled: true
    severity: high
  dc_cap_drop_all:
    enabled: true
    severity: warning
  dc_depends_on_deadlock:
    enabled: true
    severity: warning
  dc_resource_limits:
    enabled: true
    severity: warning
    per_worker_mb: 128
layer2:
  deployment_name_match: false
  image_name_match: false
  secret_key_match: false
layer3:
  healthz: false
  pod_status: false
  load_test: false
audit:
  dir: .gate-audit/
  retain_days: 30
selfcheck:
  min_layer1_checks: 3
  min_layer2_checks: 0

# Docker Compose specific checks
custom_checks:
  - id: compose_healthcheck
    description: "Verify Docker Compose services have healthcheck defined"
    command: "grep -L 'healthcheck:' docker-compose*.yml docker-compose*.yaml 2>/dev/null | head -5; test -z \"$(grep -L 'healthcheck:' docker-compose*.yml docker-compose*.yaml 2>/dev/null)\""
    severity: warning
    fix_hint: "Add a healthcheck block to each service in your docker-compose file."
  - id: compose_restart_policy
    description: "Verify Docker Compose services have restart policy"
    command: "grep -L 'restart:' docker-compose*.yml docker-compose*.yaml 2>/dev/null | head -5; test -z \"$(grep -L 'restart:' docker-compose*.yml docker-compose*.yaml 2>/dev/null)\""
    severity: warning
    fix_hint: "Add 'restart: unless-stopped' or 'restart: always' to each service."
  - id: no_hardcoded_secrets
    description: "Scan for hardcoded passwords/secrets in source code"
    pattern: "(password|secret|api_key|apikey|token)\\s*[:=]\\s*[\"'][^\"']{8,}"
    paths: "."
    exclude_pattern: "_test\\.|test_|\\.example|CHANGEME|REPLACE|placeholder"
    exclude_dirs: "dist,node_modules,__pycache__,.venv,.git"
    severity: critical
    fix_hint: "Use environment variables or a .env file (excluded from git) for secrets."
  - id: no_debug_production
    description: "Forbid DEBUG=True in production compose files"
    pattern: "DEBUG.*[Tt]rue"
    paths: "docker-compose.prod.yml docker-compose.production.yml"
    severity: critical
    fix_hint: "Remove DEBUG=True from production config. Use LOG_LEVEL=INFO instead."
  - id: dsn_protocol_consistency
    description: "Detect asyncpg DSN protocol in shared env vars"
    pattern: "postgresql\\+asyncpg://"
    paths: ". .env"
    severity: warning
    fix_hint: "Native asyncpg uses 'postgresql://', not 'postgresql+asyncpg://'. Override per-service if sharing DATABASE_URL."
  - id: pem_file_permissions
    description: "Verify PEM/key/cert file permissions are not too open"
    command: "bad_perms=0; for f in $(find . -maxdepth 3 \\( -name '*.pem' -o -name '*.key' -o -name '*.crt' \\) -not -path '*/.git/*' 2>/dev/null); do p=$(stat -f '%Lp' \"$f\" 2>/dev/null || stat -c '%a' \"$f\" 2>/dev/null); case \"$p\" in 600|400|644|640) ;; *) echo \"$f: permission $p (expected 600/644)\"; bad_perms=1 ;; esac; done; [ $bad_perms -eq 0 ]"
    severity: warning
    fix_hint: "chmod 600 or chmod 644 for PEM/key/cert files."
