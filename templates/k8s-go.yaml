version: 1
project: my-project
namespace: production
layer1:
  go_work:
    enabled: true
    severity: warning
  shell_syntax:
    enabled: true
    severity: warning
  python_packaging: false
  dockerfile_copy:
    enabled: true
    severity: warning
  dockerfile_antipatterns:
    enabled: true
    severity: warning
  secretref_ban:
    enabled: true
    severity: critical
    exclude_pattern: "secretKeyRef"
  deprecated_refs:
    enabled: true
    severity: warning
    patterns: []
  port_chain:
    enabled: true
    severity: critical
  namespace_consistency:
    enabled: true
    severity: critical
    expect: "production"
  dc_env_multiline: false
  dc_env_completeness: false
  dc_healthcheck_antipatterns: false
  dc_tmpfs_shadow: false
  dc_cap_drop_all: false
  dc_depends_on_deadlock: false
  dc_resource_limits: false
  nextjs_rewrite_completeness: false
  # FastAPI / API resilience checks
  fastapi_exception_handler: false
  fastapi_endpoint_try_except: false
  api_path_literal_ban: false
  ratelimit_retry_after:
    enabled: true
    severity: critical
  # LUMI-inspired checks
  env_placeholders: true
  secret_file_refs: true
  dep_lock_compat: true
  python_duplicate_modules: false
  test_isolation: false
layer2:
  secret_name: "my-secret"
  deployment_name_match: true
  image_name_match: true
  secret_key_match: true
layer3:
  healthz: true
  pod_status: true
  load_test: false
audit:
  dir: .gate-audit/
  retain_days: 30
selfcheck:
  min_layer1_checks: 5
  min_layer2_checks: 3

