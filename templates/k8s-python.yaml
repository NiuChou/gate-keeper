version: 1
project: my-project
namespace: production
layer1:
  go_work: false
  shell_syntax: true
  python_packaging: true
  dockerfile_copy: true
  dockerfile_antipatterns: true
  secretref_ban: true
  deprecated_refs:
    enabled: true
    patterns: []
  port_chain: true
  namespace_consistency: true
  dc_env_multiline: false
  dc_env_completeness: false
  dc_healthcheck_antipatterns: false
  dc_tmpfs_shadow: false
  dc_cap_drop_all: false
  dc_depends_on_deadlock: false
  dc_resource_limits: false
  nextjs_rewrite_completeness: false
  # FastAPI / API resilience checks
  fastapi_exception_handler:
    enabled: true
    severity: critical
  fastapi_endpoint_try_except:
    enabled: true
    severity: high
  api_path_literal_ban: false
  ratelimit_retry_after:
    enabled: true
    severity: critical
  # LUMI-inspired checks
  env_placeholders: true
  secret_file_refs: true
  dep_lock_compat: false
  python_duplicate_modules: true
  test_isolation: true
layer2:
  secret_name: "my-secret"
  deployment_name_match: true
  image_name_match: true
  secret_key_match: true
layer3:
  healthz: true
  pod_status: true
  load_test: false
audit:
  dir: .gate-audit/
  retain_days: 30
selfcheck:
  min_layer1_checks: 4
  min_layer2_checks: 3

