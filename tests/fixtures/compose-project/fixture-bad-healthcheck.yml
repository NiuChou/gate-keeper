version: "3.8"
services:
  caddy:
    image: caddy:2
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider https://localhost:443/healthz"]
      interval: 10s
      timeout: 5s

  long-worker:
    image: myapp:latest
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x celery_worker_process_long"]
      interval: 10s
      timeout: 5s
